name: "✨ Feature request"
description: "Suggest an improvement"
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: "🧩 Problem"
      description: What is missing or painful today?
      placeholder: Clear problem statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "🚀 Proposed solution"
      placeholder: What should be added/changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "🔁 Alternatives considered"
      placeholder: Optional
  - type: textarea
    id: context
    attributes:
      label: "📎 Additional context"
      placeholder: Links, screenshots, examples
